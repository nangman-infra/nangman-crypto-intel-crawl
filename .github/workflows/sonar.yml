name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.0"

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_TOOLCHAIN}"
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Run Rust fmt gate
        run: cargo fmt --all --check

      - name: Run Clippy gate
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust test gate
        run: cargo test --all-targets

  sonarqube:
    name: SonarQube Scan
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy
          rustup default "${RUST_TOOLCHAIN}"
          cargo --version
          cargo clippy --version

      - name: Generate Clippy report for SonarQube
        run: |
          mkdir -p sonar-reports
          cargo clippy --all-targets --message-format=json --quiet > sonar-reports/clippy.json

      - name: Generate coverage report for SonarQube
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --all-targets --lcov --output-path sonar-reports/lcov.info
          test -s sonar-reports/lcov.info

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}

      - name: Print SonarQube quality gate details
        if: failure()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}
        run: |
          task_file=".scannerwork/report-task.txt"
          if [ ! -f "${task_file}" ]; then
            echo "SonarQube task metadata was not generated."
            exit 0
          fi

          ce_task_id="$(awk -F= '/^ceTaskId=/ { print $2 }' "${task_file}")"
          if [ -z "${ce_task_id}" ]; then
            echo "SonarQube task id was not found."
            exit 0
          fi

          analysis_id=""
          for attempt in $(seq 1 10); do
            task_json="$(curl --silent --show-error --user "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${ce_task_id}" || true)"
            if [ -z "${task_json}" ]; then
              echo "SonarQube task response was empty."
              exit 0
            fi

            analysis_id="$(SONAR_TASK_JSON="${task_json}" python3 -c 'import json, os; print(json.loads(os.environ["SONAR_TASK_JSON"]).get("task", {}).get("analysisId", ""))' 2>/dev/null || true)"
            if [ -n "${analysis_id}" ]; then
              break
            fi
            echo "SonarQube analysis id was not available yet; retry ${attempt}/10."
            sleep 3
          done

          if [ -z "${analysis_id}" ]; then
            echo "SonarQube analysis id was not available yet."
            exit 0
          fi

          gate_json="$(curl --silent --show-error --user "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${analysis_id}" || true)"
          if [ -z "${gate_json}" ]; then
            echo "SonarQube quality gate response was empty."
            exit 0
          fi

          SONAR_GATE_JSON="${gate_json}" python3 -c 'import json, os; status = json.loads(os.environ["SONAR_GATE_JSON"]).get("projectStatus", {}); print("SonarQube quality gate: {}".format(status.get("status", "UNKNOWN"))); [print("{}: {} actual={} threshold={} comparator={}".format(condition.get("status", "UNKNOWN"), condition.get("metricKey", "unknown_metric"), condition.get("actualValue", "n/a"), condition.get("errorThreshold", "n/a"), condition.get("comparator", "n/a"))) for condition in status.get("conditions", [])]' || true
