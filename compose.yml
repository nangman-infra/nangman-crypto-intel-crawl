name: nangman-crypto-intel-crawl

x-intel-crawl-common: &intel-crawl-common
  build:
    context: ${INTEL_CRAWL_REPO_ROOT:-.}
    dockerfile: Dockerfile
  image: nangman-crypto-intel-crawl-app:dev
  restart: unless-stopped
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  environment:
    AWS_ACCESS_KEY_ID: ${INTEL_CRAWL_L0_OBJECT_STORE_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${INTEL_CRAWL_L0_OBJECT_STORE_SECRET_ACCESS_KEY}
    AWS_REGION: ${INTEL_CRAWL_L0_OBJECT_STORE_REGION:-ap-northeast-2}
    AWS_DEFAULT_REGION: ${INTEL_CRAWL_L0_OBJECT_STORE_REGION:-ap-northeast-2}
    AWS_EC2_METADATA_DISABLED: "true"
    INTEL_CRAWL_LOG_LEVEL: ${INTEL_CRAWL_LOG_LEVEL:-info}
  healthcheck:
    disable: true
  networks:
    - nangman-crypto-bus

services:
  rss-worker:
    <<: *intel-crawl-common
    command:
      - --source-registry
      - /opt/nangman-crypto/intel-crawl/config/source-registry.rss-seed.v1.json
      - --max-items-per-source
      - ${INTEL_CRAWL_MAX_ITEMS_PER_SOURCE:-20}
      - --schedule-interval-ms
      - ${INTEL_CRAWL_SCHEDULE_INTERVAL_MS:-900000}
      - --nats-url
      - ${NATS_URL:-nats://nats:4222}
      - --nats-subject
      - ${INTEL_CRAWL_NATS_SUBJECT:-raw_intel_event.created}
      - --nats-stream
      - ${INTEL_CRAWL_NATS_STREAM:-RAW_INTEL}
      - --object-store-endpoint
      - ${INTEL_CRAWL_L0_OBJECT_STORE_ENDPOINT:-https://s3.ap-northeast-2.amazonaws.com}
      - --object-store-bucket
      - ${INTEL_CRAWL_L0_OBJECT_STORE_BUCKET:-<bucket-name>}
      - --object-store-region
      - ${INTEL_CRAWL_L0_OBJECT_STORE_REGION:-ap-northeast-2}
      - --object-store-force-path-style
      - ${INTEL_CRAWL_L0_OBJECT_STORE_FORCE_PATH_STYLE:-false}
      - --dedup-lookback-days
      - ${INTEL_CRAWL_DEDUP_LOOKBACK_DAYS:-14}
      - --chunk-max-records
      - ${INTEL_CRAWL_CHUNK_MAX_RECORDS:-1000}
      - --derivatives-max-events-per-run
      - ${INTEL_CRAWL_DERIVATIVES_MAX_EVENTS_PER_RUN:-12}
      - --derivatives-max-events-per-source
      - ${INTEL_CRAWL_DERIVATIVES_MAX_EVENTS_PER_SOURCE:-6}
      - --community-max-events-per-run
      - ${INTEL_CRAWL_COMMUNITY_MAX_EVENTS_PER_RUN:-30}
      - --community-max-events-per-source
      - ${INTEL_CRAWL_COMMUNITY_MAX_EVENTS_PER_SOURCE:-5}

networks:
  nangman-crypto-bus:
    external: true
    name: ${NANGMAN_NATS_DOCKER_NETWORK:-nangman-crypto-bus}
